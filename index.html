<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logos/feather.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraScribe</title>
    <!-- Splash styles are inlined (not imported) so they're parsed
         synchronously with the HTML and the logo paints on the very first
         webview frame — no waiting for Vite, React, or module graph loads. -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #030712; }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: radial-gradient(ellipse at center,
          #0f1424 0%, #060a17 55%, #030712 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                     system-ui, sans-serif;
        color: #e5e7eb;
        user-select: none;
        -webkit-user-select: none;
        opacity: 1;
        transition: opacity 320ms ease-in;
      }
      /* React adds .hidden once the engine reports ready. */
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash .logo-wrap {
        position: relative;
        width: 128px;
        height: 128px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #splash .logo-glow {
        position: absolute;
        inset: -28px;
        border-radius: 50%;
        background: radial-gradient(circle,
          rgba(124, 150, 248, 0.35),
          rgba(168, 85, 247, 0.22) 40%,
          transparent 70%);
        filter: blur(8px);
        animation: splashPulse 2.6s ease-in-out infinite;
      }
      #splash .logo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 0 22px rgba(124, 150, 248, 0.45));
      }
      #splash .title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.04em;
        background: linear-gradient(135deg, #7c96f8 0%, #a855f7 55%, #22d3ee 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      #splash .subtitle {
        font-size: 10px;
        color: #6b7280;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      #splash .bar {
        width: 160px;
        height: 2px;
        margin-top: 6px;
        border-radius: 999px;
        background: rgba(124, 150, 248, 0.12);
        overflow: hidden;
      }
      #splash .bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg,
          transparent,
          rgba(124, 150, 248, 0.9),
          rgba(168, 85, 247, 0.8),
          transparent);
        animation: splashShimmer 1.4s linear infinite;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.65; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.08); }
      }
      @keyframes splashShimmer {
        from { transform: translateX(-100%); }
        to   { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <!-- Splash renders from static HTML so it's on screen before React
         boots. React marks it .hidden once the engine is ready, then a
         tiny effect removes it from the DOM after the fade finishes. -->
    <div id="splash" aria-hidden="false">
      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <img class="logo" src="/logos/feather.svg" alt="AuraScribe" />
      </div>
      <div class="title">AuraScribe</div>
      <div class="subtitle">Local meeting intelligence</div>
      <div class="bar" aria-hidden="true"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
