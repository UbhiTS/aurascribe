name: Release

# Release pipeline for the AuraScribe Windows installer.
#
#   * Tag push  (v*)        — builds + creates a DRAFT GitHub Release
#                              with the NSIS installer attached. Review
#                              the draft, then Publish manually.
#   * Manual    (workflow_dispatch) — builds + uploads the installer as
#                              a CI artifact only (no release).
#
# To cut a release:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # required for tauri-action to create the draft release

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Mirrors the local dev setup: `.venv` at the repo root, sidecar
      # installed editable with [all] extras (asr + diarization + llm).
      # The NVIDIA CUDA 12 wheels ship the cuBLAS / cuDNN DLLs that
      # ctranslate2 (faster-whisper's backend) links against. Not
      # declared in pyproject because they're an optional runtime
      # acceleration dep, not a Python-level import dep.
      - name: Install Python sidecar + build tools
        shell: powershell
        run: |
          python -m venv .venv
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\pip install -e ".\sidecar[all]"
          .venv\Scripts\pip install nvidia-cublas-cu12 nvidia-cudnn-cu12 pyinstaller

      - name: Build Python sidecar (PyInstaller onedir)
        run: npm run build:sidecar

      - name: Verify sidecar output
        shell: powershell
        run: |
          $exe = "sidecar\dist\aurascribe-sidecar\aurascribe-sidecar.exe"
          if (-not (Test-Path $exe)) {
              throw "Expected sidecar binary at $exe but it was not produced."
          }
          $size = [math]::Round(((Get-ChildItem -Recurse (Split-Path $exe) | Measure-Object Length -Sum).Sum / 1MB), 1)
          Write-Host "Sidecar bundle: $size MB"

      # tauri-action runs `tauri build`, picks up the already-built
      # sidecar via `bundle.resources` in tauri.conf.json, and (on tag
      # pushes) drafts a GitHub Release with the NSIS installer
      # attached. We create it as a draft so nothing goes public
      # without an explicit Publish click.
      - name: Build Tauri app + draft release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('AuraScribe {0}', github.ref_name) || '' }}
          releaseBody: |
            Windows installer (NSIS).

            - Installs to `%LOCALAPPDATA%\Programs\AuraScribe` — no admin rights needed.
            - User data (DB, audio, logs, models) lives under `%APPDATA%\AuraScribe`. Uninstalling leaves that tree untouched.
            - First launch downloads the Whisper + pyannote models (~2 GB); subsequent launches are instant.
          releaseDraft: true
          prerelease: false

      # Always upload as a CI artifact too — covers the
      # workflow_dispatch case (no release created), and gives us a
      # 30-day download link even for tag runs in case the release
      # draft gets deleted.
      - name: Upload installer as CI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AuraScribe-${{ github.sha }}-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
