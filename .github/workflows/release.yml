name: Release

# Two-variant Windows release pipeline.
#
#   * Tag push  (v*)         — builds BOTH variants in parallel + creates a
#                              DRAFT GitHub Release with both installers
#                              attached. Review + click Publish manually.
#   * Manual    (workflow_dispatch) — builds + uploads both installers as
#                              CI artifacts only (no release).
#
# VARIANTS
#   cuda  — PyTorch CUDA 12.1 wheel + NVIDIA cuBLAS/cuDNN DLLs bundled.
#           Works with or without an NVIDIA GPU (CPU fallback happens at
#           runtime), but installer is ~1.5–2 GB.
#   cpu   — PyTorch CPU wheel. No CUDA DLLs shipped. Installer is ~700–900 MB.
#           Runs Whisper on CPU even on machines that have a GPU.
#
# Output filenames are stable so bookmarks / release pages don't break:
#   AuraScribe-CUDA-setup.exe
#   AuraScribe-CPU-setup.exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # required for the release job to create/upload to the draft

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      # Don't cancel the other variant if one fails — we still want a usable
      # artifact even if one combo hits a transitive-dep issue on this runner.
      fail-fast: false
      matrix:
        include:
          - variant: cuda
            # cu128 is the current CUDA-12 index with Python 3.13 wheels;
            # cu121/cu124 were dropped for newer torch versions. Bump this
            # when PyTorch ships a newer CUDA major.
            torch_index: https://download.pytorch.org/whl/cu128
            installer_name: AuraScribe-CUDA-setup.exe
          - variant: cpu
            torch_index: https://download.pytorch.org/whl/cpu
            installer_name: AuraScribe-CPU-setup.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Cache key includes the variant so cuda + cpu don't clobber
          # each other's target/.
          key: ${{ matrix.variant }}

      - name: Install npm dependencies
        run: npm ci

      # Two-step pip install: first the variant-specific torch wheel,
      # then the sidecar with its extras. Installing torch ahead of
      # `pip install -e .[all]` pins the wheel so the extras' install
      # doesn't re-resolve torch to the default CPU wheel from PyPI.
      - name: Install PyTorch (${{ matrix.variant }})
        shell: powershell
        run: |
          python -m venv .venv
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\pip install torch torchaudio --index-url ${{ matrix.torch_index }}

      - name: Install sidecar + ML extras + build tools
        shell: powershell
        run: |
          .venv\Scripts\pip install -e ".\sidecar[all]"
          .venv\Scripts\pip install pyinstaller

      - name: Install NVIDIA CUDA runtime DLLs (cuda variant only)
        if: matrix.variant == 'cuda'
        shell: powershell
        run: .venv\Scripts\pip install nvidia-cublas-cu12 nvidia-cudnn-cu12

      - name: Build Python sidecar (PyInstaller onedir)
        run: npm run build:sidecar

      - name: Verify sidecar output
        shell: powershell
        run: |
          $exe = "sidecar\dist\aurascribe-sidecar\aurascribe-sidecar.exe"
          if (-not (Test-Path $exe)) { throw "Sidecar not produced at $exe" }
          $bundleDir = Split-Path $exe
          $sizeMB = [math]::Round(((Get-ChildItem -Recurse $bundleDir | Measure-Object Length -Sum).Sum / 1MB), 1)
          Write-Host "Sidecar bundle (${{ matrix.variant }}): $sizeMB MB"

      # NSIS (32-bit makensis) crashes with "Internal compiler error
      # #12345: error mmapping datablock" on the full ~1.5 GB CUDA
      # sidecar. WiX's light.exe is also 32-bit and OOMs similarly.
      # Workaround: move the big CUDA DLLs out of the sidecar bundle
      # into a separate zip that gets shipped as a release asset and
      # downloaded by the sidecar on first launch. The installer then
      # carries only the slim "CUDA-less" bundle, which NSIS handles
      # just fine.
      #
      # The marker file tells the running sidecar (see
      # aurascribe/cuda_runtime.py) that the runtime needs hydrating.
      # The ready-marker file is written only after a successful
      # extract on the user's machine, so crashed/interrupted downloads
      # are retried automatically.
      - name: Split CUDA runtime bundle (cuda variant only)
        if: matrix.variant == 'cuda'
        shell: powershell
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:VERSION.TrimStart('v')
          $bundleDir = Resolve-Path "sidecar\dist\aurascribe-sidecar"
          $runtimeDir = "sidecar\dist\cuda-runtime"
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null

          # Plant the marker inside the sidecar bundle so that at
          # runtime the sidecar knows to fetch the runtime zip before
          # importing anything CUDA-backed.
          $markerDir = Join-Path $bundleDir "_internal\aurascribe"
          New-Item -ItemType Directory -Force -Path $markerDir | Out-Null
          $version | Out-File -FilePath (Join-Path $markerDir "requires_cuda_runtime.txt") `
            -Encoding ASCII -NoNewline

          # Move anything >=50 MB (the big CUDA kernel DLLs —
          # torch_cuda.dll, cudnn_*, cublas_*, etc.) plus everything
          # under _internal/nvidia/ (nvidia-cu12 wheel contents). The
          # resulting bundle is comfortably under 1 GB so NSIS handles
          # it without blowing through its mmap limit.
          $threshold = 50MB
          $bundleRoot = $bundleDir.Path
          $big = Get-ChildItem -Path $bundleRoot -Recurse -File | Where-Object { $_.Length -ge $threshold }
          foreach ($f in $big) {
            $rel = $f.FullName.Substring($bundleRoot.Length + 1)
            $dest = Join-Path $runtimeDir $rel
            New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
            Move-Item -Force $f.FullName $dest
          }

          $nvidiaSrc = Join-Path $bundleRoot "_internal\nvidia"
          if (Test-Path $nvidiaSrc) {
            $nvidiaDst = Join-Path $runtimeDir "_internal\nvidia"
            New-Item -ItemType Directory -Force -Path (Split-Path $nvidiaDst) | Out-Null
            if (Test-Path $nvidiaDst) { Remove-Item -Recurse -Force $nvidiaDst }
            Move-Item -Force $nvidiaSrc $nvidiaDst
          }

          $runtimeBytes = (Get-ChildItem -Recurse $runtimeDir | Measure-Object Length -Sum).Sum
          $remainBytes = (Get-ChildItem -Recurse $bundleRoot | Measure-Object Length -Sum).Sum
          Write-Host ("Split: runtime={0:N1} MB, remaining bundle={1:N1} MB" -f `
            ($runtimeBytes / 1MB), ($remainBytes / 1MB))

          # The full runtime is ~3.9 GB — GitHub Release assets are
          # capped at 2 GB per file, so we bin-pack files into multiple
          # < 1800 MB zips and publish a small manifest next to them.
          # First-fit-decreasing: sort files by size descending, drop
          # each into the first bin with room, else open a new bin.
          # CUDA kernel DLLs don't compress (they're already compressed
          # internally) so we store (-mx=0) to keep CI + client-side
          # extract fast.
          $maxBinSize = 1800MB
          $files = Get-ChildItem -Path $runtimeDir -Recurse -File | Sort-Object Length -Descending
          $bins = New-Object System.Collections.ArrayList
          foreach ($f in $files) {
            $placed = $false
            for ($i = 0; $i -lt $bins.Count; $i++) {
              if ($bins[$i].Size + $f.Length -le $maxBinSize) {
                $bins[$i].Files.Add($f) | Out-Null
                $bins[$i].Size += $f.Length
                $placed = $true
                break
              }
            }
            if (-not $placed) {
              $bin = [pscustomobject]@{
                Files = New-Object System.Collections.ArrayList
                Size  = 0L
              }
              $bin.Files.Add($f) | Out-Null
              $bin.Size = $f.Length
              $bins.Add($bin) | Out-Null
            }
          }

          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          $baseName = "AuraScribe-CUDA-runtime-v$version"
          $manifestLines = New-Object System.Collections.ArrayList
          $manifestLines.Add("version=$version") | Out-Null
          $manifestLines.Add("parts=$($bins.Count)") | Out-Null

          # Capture the absolute paths BEFORE the push — inside the
          # pushed location, relative references like $runtimeDir
          # resolve against the new cwd (creating a doubled path).
          $runtimeDirAbs = (Resolve-Path $runtimeDir).Path
          $workspaceDir = (Get-Location).Path

          Push-Location $runtimeDir
          try {
            for ($i = 0; $i -lt $bins.Count; $i++) {
              $partIndex = $i + 1
              $partName = "$baseName.part$partIndex.zip"
              $listFile = Join-Path $env:RUNNER_TEMP "part$partIndex.lst"
              $partAbs = Join-Path $workspaceDir $partName

              # Write relative paths so 7z zips with paths preserved.
              $relPaths = foreach ($bf in $bins[$i].Files) {
                $bf.FullName.Substring($runtimeDirAbs.Length + 1)
              }
              Set-Content -Path $listFile -Value $relPaths -Encoding ASCII

              & $sevenZip a -tzip -mx=0 $partAbs "@$listFile" | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "7z failed on part $partIndex with exit $LASTEXITCODE" }
            }
          } finally {
            Pop-Location
          }

          for ($i = 0; $i -lt $bins.Count; $i++) {
            $partIndex = $i + 1
            $partName = "$baseName.part$partIndex.zip"
            $partSizeMB = [math]::Round((Get-Item $partName).Length / 1MB, 1)
            $manifestLines.Add("part$partIndex=$partName") | Out-Null
            Write-Host "Part ${partIndex}: $partName ($partSizeMB MB)"
          }

          $manifestName = "$baseName.manifest.txt"
          $manifestLines | Out-File -FilePath $manifestName -Encoding ASCII
          Write-Host "Manifest: $manifestName"
          Get-Content $manifestName | ForEach-Object { Write-Host "  $_" }

      # Upload one artifact per runtime part + the manifest. The release
      # job globs `AuraScribe-CUDA-runtime-*` to pick them all up.
      - name: Upload CUDA runtime parts (cuda variant only)
        if: matrix.variant == 'cuda'
        uses: actions/upload-artifact@v4
        with:
          name: AuraScribe-CUDA-runtime-parts-${{ github.ref_name }}
          path: |
            AuraScribe-CUDA-runtime-${{ github.ref_name }}.part*.zip
            AuraScribe-CUDA-runtime-${{ github.ref_name }}.manifest.txt
          if-no-files-found: error
          retention-days: 30

      - name: Build Tauri app (${{ matrix.variant }})
        run: npm run tauri:build

      # Tauri's default NSIS output name is versioned + arch-tagged
      # (e.g. AuraScribe_0.1.0_x64-setup.exe). Rename to the stable
      # variant-tagged filename the release expects.
      - name: Rename installer to ${{ matrix.installer_name }}
        shell: powershell
        run: |
          $src = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if (-not $src) { throw "No NSIS installer produced" }
          $dst = Join-Path $src.DirectoryName "${{ matrix.installer_name }}"
          Copy-Item $src.FullName $dst -Force
          $sizeMB = [math]::Round((Get-Item $dst).Length / 1MB, 1)
          Write-Host "Installer: ${{ matrix.installer_name }} ($sizeMB MB)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.installer_name }}
          path: src-tauri/target/release/bundle/nsis/${{ matrix.installer_name }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Release creation only fires on actual tag pushes. workflow_dispatch
    # runs stop at the build stage with the installers as artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download installers + CUDA runtime parts
        uses: actions/download-artifact@v4
        with:
          pattern: AuraScribe-*
          path: ./installers
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la ./installers

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AuraScribe ${{ github.ref_name }}
          draft: true
          prerelease: false
          # Glob picks up all the runtime parts + manifest automatically.
          # Each part is < 2 GB (GitHub's per-file release asset limit).
          files: |
            installers/AuraScribe-CUDA-setup.exe
            installers/AuraScribe-CPU-setup.exe
            installers/AuraScribe-CUDA-runtime-${{ github.ref_name }}.manifest.txt
            installers/AuraScribe-CUDA-runtime-${{ github.ref_name }}.part*.zip
          body: |
            Windows installers — two flavours:

            | Installer | When to pick it | Installer size | Disk after first launch |
            |---|---|---|---|
            | **AuraScribe-CUDA-setup.exe** | You have an NVIDIA GPU (any RTX card). Fastest transcription + GPU diarization. On first launch the sidecar streams a ~6 GB CUDA DLL bundle from this release (four `.partN.zip` files + a manifest) into the install dir. Plan ~10–20 min on typical broadband before the app is usable. | ~140 MB | ~6 GB |
            | **AuraScribe-CPU-setup.exe** | No GPU, or you want the smaller install. Transcription is 5–10× slower but still usable. | ~260 MB | ~700–900 MB |

            Both installers:
            - Install per-user to `%LOCALAPPDATA%\Programs\AuraScribe` — no admin rights needed.
            - Store app data (DB, audio, logs, models) under `%APPDATA%\AuraScribe`. Uninstalling leaves that tree untouched.
            - Download the Whisper + pyannote models (~2 GB) on first launch; subsequent launches are instant.

            Not sure which to pick? Install CUDA. It works with or without an NVIDIA GPU — the CUDA DLL download runs regardless, but if there's no GPU the CPU fallback kicks in at runtime.

            ---
            **Why the CUDA runtime is a separate download:** the full CUDA payload is ~6 GB. NSIS (32-bit makensis) crashes with "Internal compiler error #12345" when asked to pack >1 GB of data, and GitHub release assets cap at 2 GB per file. The runtime ships as four bin-packed `.partN.zip` files plus a small `.manifest.txt`; the sidecar reads the manifest, downloads + extracts each part on first launch, and restores the full PyInstaller layout.
