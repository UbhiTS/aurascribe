name: Release

# Cross-platform release pipeline — Windows (CUDA + CPU) and macOS (CPU/MPS).
#
#   * Tag push  (v*)             — builds all variants in parallel + creates a
#                                  DRAFT GitHub Release with all installers
#                                  attached. Review + click Publish manually.
#   * Manual (workflow_dispatch) — builds + uploads installers as CI artifacts
#                                  only (no release).
#
# VARIANTS
#   windows-cuda  — PyTorch CUDA 12.8 wheel + NVIDIA cuBLAS/cuDNN DLLs bundled.
#                   Works with or without an NVIDIA GPU (CPU fallback at runtime).
#                   Installer ~1.5–2 GB (CUDA DLLs streamed on first launch).
#   windows-cpu   — PyTorch CPU wheel. No CUDA DLLs. Installer ~700–900 MB.
#   macos         — PyTorch standard wheel (MPS + CPU). Packaged as a .dmg.
#                   Runs on Apple Silicon (MPS acceleration) and Intel (CPU).
#                   Installer ~700 MB.
#
# Output filenames are stable so bookmarks / release pages don't break:
#   AuraScribe-CUDA-setup.exe
#   AuraScribe-CPU-setup.exe
#   AuraScribe-macOS-arm64.dmg

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # required for the release job to create/upload to the draft

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      # Don't cancel the other variants if one fails.
      fail-fast: false
      matrix:
        include:
          # ── Windows CUDA ──────────────────────────────────────────────────
          - label: windows-cuda
            os: windows-latest
            variant: cuda
            torch_index: https://download.pytorch.org/whl/cu128
            installer_name: AuraScribe-CUDA-setup.exe
          # ── Windows CPU ───────────────────────────────────────────────────
          - label: windows-cpu
            os: windows-latest
            variant: cpu
            torch_index: https://download.pytorch.org/whl/cpu
            installer_name: AuraScribe-CPU-setup.exe
          # ── macOS arm64 (Apple Silicon — MPS; Intel via Rosetta 2 — CPU) ────
          - label: macos-arm64
            os: macos-latest        # resolves to macos-15 arm64 as of 2025
            variant: cpu
            # Standard PyPI torch wheel includes MPS for Apple Silicon.
            # No special index URL needed.
            torch_index: ""
            installer_name: AuraScribe-macOS-arm64.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install npm dependencies
        run: npm ci

      # ── Python venv + deps (Windows) ────────────────────────────────────
      - name: Install PyTorch — Windows (${{ matrix.variant }})
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          python -m venv .venv
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\pip install torch torchaudio --index-url ${{ matrix.torch_index }}

      - name: Install sidecar + ML extras + build tools — Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          .venv\Scripts\pip install -e ".\sidecar[all]"
          .venv\Scripts\pip install pyinstaller

      - name: Install NVIDIA CUDA runtime DLLs (windows-cuda only)
        if: matrix.label == 'windows-cuda'
        shell: powershell
        run: .venv\Scripts\pip install nvidia-cublas-cu12 nvidia-cudnn-cu12

      # ── Python venv + deps (macOS) ───────────────────────────────────────
      - name: Install PyTorch — macOS (MPS-capable from PyPI)
        if: runner.os == 'macOS'
        run: |
          python3 -m venv .venv
          .venv/bin/python3 -m pip install --upgrade pip
          .venv/bin/pip install torch torchaudio

      - name: Install sidecar + ML extras + build tools — macOS
        if: runner.os == 'macOS'
        run: |
          .venv/bin/pip install -e "./sidecar[all]"
          .venv/bin/pip install pyinstaller

      # ── Build Python sidecar ─────────────────────────────────────────────
      - name: Build Python sidecar — Windows
        if: runner.os == 'Windows'
        run: npm run build:sidecar

      - name: Build Python sidecar — macOS
        if: runner.os == 'macOS'
        run: npm run build:sidecar

      # ── Verify sidecar ───────────────────────────────────────────────────
      - name: Verify sidecar output — Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $exe = "sidecar\dist\aurascribe-sidecar\aurascribe-sidecar.exe"
          if (-not (Test-Path $exe)) { throw "Sidecar not produced at $exe" }
          $bundleDir = Split-Path $exe
          $sizeMB = [math]::Round(((Get-ChildItem -Recurse $bundleDir | Measure-Object Length -Sum).Sum / 1MB), 1)
          Write-Host "Sidecar bundle (${{ matrix.label }}): $sizeMB MB"

      - name: Verify sidecar output — macOS
        if: runner.os == 'macOS'
        run: |
          bin="sidecar/dist/aurascribe-sidecar/aurascribe-sidecar"
          if [[ ! -f "$bin" ]]; then echo "ERROR: Sidecar not produced at $bin" >&2; exit 1; fi
          size=$(du -sh "$(dirname "$bin")" | cut -f1)
          echo "Sidecar bundle (${{ matrix.label }}): $size"

      # ── Windows CUDA runtime split ───────────────────────────────────────
      # NSIS (32-bit makensis) crashes on bundles > ~1 GB. Move the big CUDA
      # DLLs out into separate .partN.zip files that the sidecar streams on
      # first launch. The slim installer then carries only the CUDA-less
      # bundle, which NSIS handles fine.
      - name: Split CUDA runtime bundle (windows-cuda only)
        if: matrix.label == 'windows-cuda'
        shell: powershell
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:VERSION.TrimStart('v')
          $bundleDir = Resolve-Path "sidecar\dist\aurascribe-sidecar"
          $runtimeDir = "sidecar\dist\cuda-runtime"
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null

          $markerDir = Join-Path $bundleDir "_internal\aurascribe"
          New-Item -ItemType Directory -Force -Path $markerDir | Out-Null
          $version | Out-File -FilePath (Join-Path $markerDir "requires_cuda_runtime.txt") `
            -Encoding ASCII -NoNewline

          $threshold = 50MB
          $bundleRoot = $bundleDir.Path
          $big = Get-ChildItem -Path $bundleRoot -Recurse -File | Where-Object { $_.Length -ge $threshold }
          foreach ($f in $big) {
            $rel = $f.FullName.Substring($bundleRoot.Length + 1)
            $dest = Join-Path $runtimeDir $rel
            New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
            Move-Item -Force $f.FullName $dest
          }

          $nvidiaSrc = Join-Path $bundleRoot "_internal\nvidia"
          if (Test-Path $nvidiaSrc) {
            $nvidiaDst = Join-Path $runtimeDir "_internal\nvidia"
            New-Item -ItemType Directory -Force -Path (Split-Path $nvidiaDst) | Out-Null
            if (Test-Path $nvidiaDst) { Remove-Item -Recurse -Force $nvidiaDst }
            Move-Item -Force $nvidiaSrc $nvidiaDst
          }

          $runtimeBytes = (Get-ChildItem -Recurse $runtimeDir | Measure-Object Length -Sum).Sum
          $remainBytes  = (Get-ChildItem -Recurse $bundleRoot  | Measure-Object Length -Sum).Sum
          Write-Host ("Split: runtime={0:N1} MB, remaining bundle={1:N1} MB" -f `
            ($runtimeBytes / 1MB), ($remainBytes / 1MB))

          $maxBinSize = 1800MB
          $files = Get-ChildItem -Path $runtimeDir -Recurse -File | Sort-Object Length -Descending
          $bins = New-Object System.Collections.ArrayList
          foreach ($f in $files) {
            $placed = $false
            for ($i = 0; $i -lt $bins.Count; $i++) {
              if ($bins[$i].Size + $f.Length -le $maxBinSize) {
                $bins[$i].Files.Add($f) | Out-Null
                $bins[$i].Size += $f.Length
                $placed = $true
                break
              }
            }
            if (-not $placed) {
              $bin = [pscustomobject]@{ Files = New-Object System.Collections.ArrayList; Size = 0L }
              $bin.Files.Add($f) | Out-Null
              $bin.Size = $f.Length
              $bins.Add($bin) | Out-Null
            }
          }

          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          $baseName = "AuraScribe-CUDA-runtime-v$version"
          $manifestLines = New-Object System.Collections.ArrayList
          $manifestLines.Add("version=$version") | Out-Null
          $manifestLines.Add("parts=$($bins.Count)") | Out-Null

          $runtimeDirAbs = (Resolve-Path $runtimeDir).Path
          $workspaceDir  = (Get-Location).Path

          Push-Location $runtimeDir
          try {
            for ($i = 0; $i -lt $bins.Count; $i++) {
              $partIndex = $i + 1
              $partName  = "$baseName.part$partIndex.zip"
              $listFile  = Join-Path $env:RUNNER_TEMP "part$partIndex.lst"
              $partAbs   = Join-Path $workspaceDir $partName
              $relPaths  = foreach ($bf in $bins[$i].Files) {
                $bf.FullName.Substring($runtimeDirAbs.Length + 1)
              }
              Set-Content -Path $listFile -Value $relPaths -Encoding ASCII
              & $sevenZip a -tzip -mx=0 $partAbs "@$listFile" | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "7z failed on part $partIndex with exit $LASTEXITCODE" }
            }
          } finally {
            Pop-Location
          }

          for ($i = 0; $i -lt $bins.Count; $i++) {
            $partIndex = $i + 1
            $partName  = "$baseName.part$partIndex.zip"
            $partSizeMB = [math]::Round((Get-Item $partName).Length / 1MB, 1)
            $manifestLines.Add("part$partIndex=$partName") | Out-Null
            Write-Host "Part ${partIndex}: $partName ($partSizeMB MB)"
          }

          $manifestName = "$baseName.manifest.txt"
          $manifestLines | Out-File -FilePath $manifestName -Encoding ASCII
          Write-Host "Manifest: $manifestName"
          Get-Content $manifestName | ForEach-Object { Write-Host "  $_" }

      - name: Upload CUDA runtime parts (windows-cuda only)
        if: matrix.label == 'windows-cuda'
        uses: actions/upload-artifact@v4
        with:
          name: AuraScribe-CUDA-runtime-parts-${{ github.ref_name }}
          path: |
            AuraScribe-CUDA-runtime-${{ github.ref_name }}.part*.zip
            AuraScribe-CUDA-runtime-${{ github.ref_name }}.manifest.txt
          if-no-files-found: error
          retention-days: 30

      # ── Build Tauri app ───────────────────────────────────────────────────
      - name: Build Tauri app (${{ matrix.label }})
        run: npm run tauri:build

      # ── Rename installer to stable filename ──────────────────────────────
      - name: Rename installer — Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $src = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if (-not $src) { throw "No NSIS installer produced" }
          $dst = Join-Path $src.DirectoryName "${{ matrix.installer_name }}"
          Copy-Item $src.FullName $dst -Force
          $sizeMB = [math]::Round((Get-Item $dst).Length / 1MB, 1)
          Write-Host "Installer: ${{ matrix.installer_name }} ($sizeMB MB)"

      - name: Rename installer — macOS
        if: runner.os == 'macOS'
        run: |
          src=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          if [[ -z "$src" ]]; then echo "ERROR: No DMG produced" >&2; exit 1; fi
          dst="$(dirname "$src")/${{ matrix.installer_name }}"
          cp "$src" "$dst"
          size=$(du -h "$dst" | cut -f1)
          echo "Installer: ${{ matrix.installer_name }} ($size)"

      # ── Upload installer artifact ────────────────────────────────────────
      - name: Upload installer — Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.installer_name }}
          path: src-tauri/target/release/bundle/nsis/${{ matrix.installer_name }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer — macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.installer_name }}
          path: src-tauri/target/release/bundle/dmg/${{ matrix.installer_name }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only fire on actual tag pushes; workflow_dispatch stops after build.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all installers + CUDA runtime parts
        uses: actions/download-artifact@v4
        with:
          pattern: AuraScribe-*
          path: ./installers
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la ./installers

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AuraScribe ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            installers/AuraScribe-CUDA-setup.exe
            installers/AuraScribe-CPU-setup.exe
            installers/AuraScribe-macOS-arm64.dmg
            installers/AuraScribe-CUDA-runtime-${{ github.ref_name }}.manifest.txt
            installers/AuraScribe-CUDA-runtime-${{ github.ref_name }}.part*.zip
          body: |
            ## Download

            | Platform | Installer | Notes |
            |---|---|---|
            | **Windows** (NVIDIA GPU) | `AuraScribe-CUDA-setup.exe` | Fastest transcription. On first launch the sidecar streams ~6 GB of CUDA DLLs — allow 10–20 min on typical broadband before the app is usable. |
            | **Windows** (no GPU) | `AuraScribe-CPU-setup.exe` | ~5–10× slower transcription but no large download. |
            | **macOS** (Apple Silicon native; Intel via Rosetta 2) | `AuraScribe-macOS-arm64.dmg` | MPS acceleration on Apple Silicon (M1/M2/M3/M4). Intel Macs run transparently via Rosetta 2 on CPU. |

            ### Windows installers
            Both install per-user to `%LOCALAPPDATA%\Programs\AuraScribe` — no admin rights needed. App data (DB, audio, logs, models) lives under `%APPDATA%\AuraScribe` and survives uninstall.

            ### macOS installer
            Drag AuraScribe to Applications. On first launch macOS will ask for microphone permission — click Allow. For **System Audio** capture (record remote participants in Zoom/Teams/Meet), install [BlackHole 2ch](https://github.com/ExistentialAudio/BlackHole) and select it as the System Audio source.

            ### First launch
            All variants download the Whisper model (~1–2 GB depending on model size) and the pyannote speaker-diarization pipeline on first launch. Subsequent launches are instant.

            ---
            **Why the Windows CUDA runtime is a separate download:** the full CUDA payload is ~6 GB. NSIS (32-bit makensis) crashes on bundles > ~1 GB, and GitHub release assets cap at 2 GB per file. The runtime ships as bin-packed `.partN.zip` files plus a `.manifest.txt`; the sidecar reads the manifest, downloads + extracts on first launch, and restores the full PyInstaller layout.
